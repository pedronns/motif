<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Motif</title>
    <link rel="stylesheet" href="./style.css" />

		<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalnia:wght@100..700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div class="header-container">
			<div class="logo-title">
				<img src="../../public/icons/48.png" class="logo" alt="logo">
				<h1>motif.</h1>
			</div>
      <div class="help-menu-container">
        <button type="button" class="help-icon-btn" id="helpBtn">?</button>
        <div class="help-tooltip">
          <p><kbd>Q</kbd> (Vídeo pausado): Inicia contagem regressiva.</p>
          <p><kbd>E</kbd> / <kbd>R</kbd>: Altera o tom da música.</p>
          <p><kbd>Shift</kbd> + <kbd>A</kbd>, <kbd>S</kbd>, <kbd>D</kbd>: Cria checkpoints.</p>
          <p><kbd>A</kbd>, <kbd>S</kbd>, <kbd>D</kbd>: Pula para o checkpoint.</p>
        </div>
      </div>
    </div>
    
    <div class="section form-group">
      <label>Tipo de Contagem</label>
      <div class="mode-selector">
        <button type="button" class="mode-btn active" id="modeSeconds">Segundos</button>
        <button type="button" class="mode-btn" id="modeBpm">BPM</button>
      </div>
    </div>
    
    <div class="row-fields">
      <div class="section form-group">
        <label>Ticks (Batidas)</label>
        <div class="selector-container">
          <button type="button" class="selector-btn" id="ticksMinus">−</button>
          <span class="selector-value" id="ticksValue">4</span>
          <button type="button" class="selector-btn" id="ticksPlus">+</button>
        </div>
      </div>
      
      <div class="section form-group" id="pitchFieldContainer">
        <label>Semitons</label>
        <div class="selector-container">
          <button type="button" class="selector-btn" id="pitchMinus">−</button>
          <span class="selector-value" id="pitchValue">0</span>
          <button type="button" class="selector-btn" id="pitchPlus">+</button>
        </div>
      </div>
      
      <div class="section form-group hidden" id="bpmFieldContainer">
        <label for="bpmInput">Andamento (BPM)</label>
        <input id="bpmInput" type="number" min="30" max="300" value="120" />
      </div>
    </div>
    
    <div class="section">
      <label class="switch-label">
        <span>Contagem no checkpoint</span>
        <div style="position: relative;">
          <input type="checkbox" checked id="checkpointCountdownEnabled" />
          <span class="slider"></span>
        </div>
      </label>
    </div>

    <div class="section">
      <label class="switch-label">
        <span>Som da contagem</span>
        <div style="position: relative;">
          <input type="checkbox" checked id="soundEnabled" />
          <span class="slider"></span>
        </div>
      </label>
    </div>
    
    <div class="section" style="margin-top: 16px; position: relative;">
      <button type="button" id="clearCheckpointsBtn">
        Limpar Checkpoints
      </button>
      <div id="clearFeedback" class="clear-feedback">Checkpoints limpos!</div>
    </div>

    <script type="module" src="./script.js"></script>
  </body>
</html>
